name: Build Release

on:
  push:
    branches: [main]
    tags: ["v[1-9].*"]

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode google-services.json
        run: |
          printf '%s' "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d > app/google-services.json

      - name: Verify google-services.json
        run: |
          if [ ! -f app/google-services.json ]; then
            echo "::error file=app/google-services.json::File was not created"
            exit 1
          fi
          SIZE=$(wc -c < app/google-services.json)
          echo "google-services.json size: $SIZE bytes"
          if [ "$SIZE" -lt 10 ]; then
            echo "::error file=app/google-services.json::File is too small ($SIZE bytes), secret may be invalid"
            exit 1
          fi

      - name: Decode keystore
        run: |
          mkdir -p keystore
          echo "${{ secrets.KEYSTORE_FILE }}" | base64 -d > keystore/meme_chat_upload.keystore

      - name: Set version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
            echo "APP_VERSION_NAME=$VERSION" >> $GITHUB_ENV
          else
            echo "APP_VERSION_NAME=0.0.${{ github.run_number }}" >> $GITHUB_ENV
          fi

      - name: Build signed AAB and APK
        run: ./gradlew bundleRelease assembleRelease \
          -PappVersionCode=${{ github.run_number }} \
          -PappVersionName=${{ env.APP_VERSION_NAME }}
        env:
          HUGGINGFACE_API_KEY: ${{ secrets.PROD_HUGGINGFACE_API_KEY }}
          MCP_KEENABLE_API_KEY: ${{ secrets.PROD_MCP_KEENABLE_API_KEY }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: fun.walawe.memechat
          releaseFiles: app/build/outputs/bundle/release/app-release.aab
          track: internal
          status: completed
          whatsNewDirectory: whatsnew/

      - name: Create GitHub Release (tagged only)
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ env.APP_VERSION_NAME }}
          body: |
            ## Release ${{ env.APP_VERSION_NAME }}

            **Commit:** ${{ github.sha }}

            ### Assets
            - APK: app-release.apk
          files: app/build/outputs/apk/release/app-release.apk
          generate_release_notes: true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: app/build/outputs/apk/release/app-release.apk
