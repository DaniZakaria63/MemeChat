name: Build Beta

on:
  push:
    branches: [beta]
    tags: ["v0.*"]

jobs:
  beta:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode google-services.json
        run: |
          printf '%s' "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d > app/google-services.json

      - name: Verify google-services.json
        run: |
          if [ ! -f app/google-services.json ]; then
            echo "::error file=app/google-services.json::File was not created"
            exit 1
          fi
          SIZE=$(wc -c < app/google-services.json)
          echo "google-services.json size: $SIZE bytes"
          if [ "$SIZE" -lt 10 ]; then
            echo "::error file=app/google-services.json::File is too small ($SIZE bytes), secret may be invalid"
            exit 1
          fi

      - name: Set version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
            echo "APP_VERSION_NAME=$VERSION" >> $GITHUB_ENV
          else
            echo "APP_VERSION_NAME=0.0.${{ github.run_number }}" >> $GITHUB_ENV
          fi

      - name: Build debug APK
        run: ./gradlew assembleDebug \
          -PappVersionCode=${{ github.run_number }} \
          -PappVersionName=${{ env.APP_VERSION_NAME }}
        env:
          HUGGINGFACE_API_KEY: ${{ secrets.BETA_HUGGINGFACE_API_KEY }}
          MCP_KEENABLE_API_KEY: ${{ secrets.BETA_MCP_KEENABLE_API_KEY }}

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          groups: internal-testers
          file: app/build/outputs/apk/debug/app-debug.apk
          releaseNotes: |
            Version: ${{ env.APP_VERSION_NAME }}
            Commit: ${{ github.sha }}
            Branch: ${{ github.ref_name }}

      - name: Create GitHub Release (tagged only)
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          name: Beta ${{ env.APP_VERSION_NAME }}
          body: |
            ## Beta Release ${{ env.APP_VERSION_NAME }}

            **Commit:** ${{ github.sha }}

            ### Assets
            - APK: app-debug.apk
          files: app/build/outputs/apk/debug/app-debug.apk
          generate_release_notes: true
